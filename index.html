<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1a1a1a, #000); overflow: hidden; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00d4ff; font-family: 'Arial'; text-align: center; text-shadow: 0 0 10px #00d4ff; }
    </style>
</head>
<body>
    <div id="loader">⚡ جاري استدعاء الأفاتار...</div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // إضاءة احترافية
        scene.add(new THREE.AmbientLight(0xffffff, 2));
        const light = new THREE.PointLight(0x00d4ff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        const loader = new THREE.GLTFLoader();
        
        // جرب يقرأ الملف بالاسمين (الطويل والقصير)
        const tryLoad = (name) => {
            loader.load(name, (gltf) => {
                scene.add(gltf.scene);
                gltf.scene.position.y = -1;
                gltf.scene.scale.set(2.5, 2.5, 2.5);
                document.getElementById('loader').style.display = 'none';
                animate();
            }, undefined, (err) => {
                if(name === 'aang.glb') tryLoad('model_1774875797409.glb');
                else document.getElementById('loader').innerText = "ارفع الملف الأصلي (3MB) وسمه aang.glb";
            });
        };

        tryLoad('aang.glb');

        camera.position.z = 4;
        function animate() {
            requestAnimationFrame(animate);
            scene.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
