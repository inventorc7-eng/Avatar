<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Aang 3D - Live</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>body { margin: 0; background: #111; overflow: hidden; }</style>
</head>
<body>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // تفعيل الألوان الحقيقية للمجسم
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // إضاءة محيطة قوية جداً عشان تظهر الألوان
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        
        // إضاءة موجهة من الأمام
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(2, 2, 5);
        scene.add(light);

        const loader = new THREE.GLTFLoader();
        // استخدام نفس المسار اللي اشتغل معاك
        loader.load('./aang.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);
            model.position.y = -1.5;
            model.scale.set(3, 3, 3);
            
            function animate() {
                requestAnimationFrame(animate);
                model.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            animate();
        });

        camera.position.z = 5;
    </script>
</body>
</html>
