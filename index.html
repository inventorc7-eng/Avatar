<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Avatar 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #status { position: absolute; top: 50%; width: 100%; text-align: center; color: #fff; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="status">محاولة أخيرة للتحميل...</div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 3));
        camera.position.z = 5;

        const loader = new THREE.GLTFLoader();
        
        // هيجرب يقرأ الملف من المسار الحالي، ومن الفولدر، ومن بره الفولدر
        const file = 'model_1774875797409.glb';
        const paths = [file, './' + file, '/Avatar/' + file, '../' + file];

        function loadPath(i) {
            if (i >= paths.length) {
                document.getElementById('status').innerText = "جيت هاب مش شايف الملف.. جرب تفتح اللينك في متصفح خفي";
                return;
            }
            loader.load(paths[i], (gltf) => {
                scene.add(gltf.scene);
                document.getElementById('status').style.display = 'none';
                animate();
            }, undefined, () => loadPath(i + 1));
        }

        loadPath(0);
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
    </script>
</body>
</html>
