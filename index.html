<!DOCTYPE html>
<html>
<head>
    <title>Avatar 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #status { position: absolute; top: 50%; width: 100%; text-align: center; color: #00d4ff; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="status">جاري سحب الأفاتار من السيرفر...</div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 3));
        camera.position.z = 5;

        const loader = new THREE.GLTFLoader();
        
        // الكود ده هيجرب يقرأ الملف مباشرة كأنه رابط محلي
        loader.load('model_1774875797409.glb', (gltf) => {
            scene.add(gltf.scene);
            gltf.scene.scale.set(2, 2, 2);
            document.getElementById('status').style.display = 'none';
        }, undefined, (err) => {
            document.getElementById('status').innerText = "حدث خطأ في المسار، انتظر دقيقة واعمل Refresh";
        });

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
