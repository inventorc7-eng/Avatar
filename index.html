<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Aang 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; }
        .ui-overlay { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; }
        .btn { width: 60px; height: 60px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; backdrop-filter: blur(5px); cursor: pointer; font-size: 20px; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loading">جاري تحضير الأفاتار...</div>
    <div class="ui-overlay">
        <button class="btn" onclick="rotate(0.2)">◀</button>
        <button class="btn" onclick="rotate(-0.2)">▶</button>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light1 = new THREE.AmbientLight(0xffffff, 2);
        scene.add(light1);
        const light2 = new THREE.DirectionalLight(0xffffff, 1);
        light2.position.set(1, 1, 1);
        scene.add(light2);

        let model;
        const loader = new THREE.GLTFLoader();
        
        // التعديل هنا: استخدام رابط مباشر للتأكد من التحميل
        loader.load('./aang.glb', (gltf) => {
            model = gltf.scene;
            scene.add(model);
            model.position.y = -1;
            document.getElementById('loading').style.display = 'none';
        }, 
        (xhr) => { console.log((xhr.loaded / xhr.total * 100) + '% loaded'); },
        (error) => { 
            document.getElementById('loading').innerText = "خطأ في تحميل الملف - تأكد من اسم aang.glb";
            console.error(error); 
        });

        camera.position.z = 3;

        function rotate(val) { if(model) model.rotation.y += val; }

        function animate() {
            requestAnimationFrame(animate);
            if(model) model.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
