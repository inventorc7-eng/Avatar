<!DOCTYPE html>
<html>
<head>
    <title>Avatar 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>body { margin: 0; background: #000; }</style>
</head>
<body>
    <div id="status" style="color:white; text-align:center; margin-top:20%;">جاري التحميل...</div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 3));
        camera.position.z = 5;

        const loader = new THREE.GLTFLoader();
        // الرابط المباشر لملفك
        const url = 'https://raw.githubusercontent.com/inventorc7-eng/Avatar/main/model_1774875797409.glb';

        loader.load(url, (gltf) => {
            scene.add(gltf.scene);
            document.getElementById('status').style.display = 'none';
        }, undefined, (e) => {
            document.getElementById('status').innerText = "خطأ: جيت هاب لسه مش شايف الملف";
        });

        function animate() { requestAnimationFrame(animate); scene.rotation.y += 0.01; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
