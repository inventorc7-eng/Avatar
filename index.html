<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Avatar Real City - Day Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none; }
        .joy { width: 100px; height: 100px; pointer-events: auto; background: rgba(255,255,255,0.1); border-radius: 50%; }
    </style>
</head>
<body>
    <div class="controls">
        <div id="joy-fly" class="joy"></div> <div id="joy-walk" class="joy"></div> </div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // نهار
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // إضاءة شمس قوية
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(50, 100, 50);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // تحميل صورة الواجهة (Texture)
        const textureLoader = new THREE.TextureLoader();
        const buildingTex = textureLoader.load('https://threejs.org/examples/textures/floors/FloorsCheckerboard_S_Diffuse.jpg'); // تجربة لسطح واقعي
        buildingTex.wrapS = buildingTex.wrapT = THREE.RepeatWrapping;
        buildingTex.repeat.set(1, 4);

        // إنشاء مدينة واقعية مع تصادم
        const buildings = [];
        for(let i=0; i<300; i++) {
            const h = Math.random() * 50 + 15;
            const geometry = new THREE.BoxGeometry(12, h, 12);
            const material = new THREE.MeshLambertMaterial({ map: buildingTex });
            const building = new THREE.Mesh(geometry, material);
            building.position.set(Math.random()*800-400, h/2, Math.random()*800-400);
            scene.add(building);
            buildings.push(building);
        }

        // الأرضية
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshLambertMaterial({color: 0x555555}));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        let avatar, walkData = {x:0, y:0}, flyData = {y:0};
        new THREE.GLTFLoader().load('./aang.glb', (gltf) => {
            avatar = gltf.scene;
            scene.add(avatar);
            avatar.add(camera);
            camera.position.set(0, 7, -15);
            camera.lookAt(0, 3, 0);
        });

        // 2 جوي ستيك
        nipplejs.create({zone: document.getElementById('joy-walk'), mode:'static', position:{right:'50px', bottom:'50px'}}).on('move', (e,d) => { walkData = d.vector; });
        nipplejs.create({zone: document.getElementById('joy-fly'), mode:'static', position:{left:'50px', bottom:'50px'}}).on('move', (e,d) => { flyData = d.vector; });

        function animate() {
            requestAnimationFrame(animate);
            if(avatar) {
                let prevPos = avatar.position.clone();
                avatar.rotation.y -= walkData.x * 0.05;
                avatar.translateZ(walkData.y * 1.0);
                avatar.position.y += flyData.y * 0.5;

                // منع الاختراق
                let avatarBox = new THREE.Box3().setFromObject(avatar);
                for(let b of buildings) {
                    if(avatarBox.intersectsBox(new THREE.Box3().setFromObject(b))) {
                        avatar.position.copy(prevPos);
                    }
                }
                if(avatar.position.y < 0) avatar.position.y = 0;
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
