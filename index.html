<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Aang 3D - Pro Environment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>body { margin: 0; background: #222; overflow: hidden; }</style>
</head>
<body>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xaaaaaa, 0.005); // ضباب رمادي بيدي عمق
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // إضاءة خافتة لتناسب جو المدينة (Daylight خفيف)
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        
        // بناء المدينة السينمائية (المدينة والتحكم شغالين)
        const cityGroup = new THREE.Group();
        const floorGeo = new THREE.PlaneGeometry(2000, 2000);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        cityGroup.add(floor);

        for(let i=0; i<600; i++) {
            const h = Math.random() * 60 + 10;
            const bGeo = new THREE.BoxGeometry(10, h, 10);
            
            // جعل 30% من المباني عشوائياً تنور "نيون"
            let matType = (Math.random() < 0.3) ? 'MeshStandardMaterial' : 'MeshBasicMaterial';
            let bColor = (matType === 'MeshStandardMaterial') ? 0x00d4ff : 0x222222;
            let bMat = new THREE[matType]({ color: bColor, emissive: bColor, emissiveIntensity: (matType === 'MeshStandardMaterial')? 1.5 : 0 });
            
            const building = new THREE.Mesh(bGeo, bMat);
            building.position.set(Math.random()*1000-500, h/2, Math.random()*1000-500);
            cityGroup.add(building);
        }
        scene.add(cityGroup);

        // تحميل الأفاتار (المجسم ظهر لايف)
        let avatar;
        const loader = new THREE.GLTFLoader();
        loader.load('./aang.glb', (gltf) => {
            avatar = gltf.scene;
            avatar.scale.set(1, 1, 1);
            scene.add(avatar);
            
            // الكاميرا مربوطة بضهر الأفاتار (Third Person Camera)
            avatar.add(camera);
            camera.position.set(0, 5, -10);
            camera.lookAt(0, 2, 0);
            
            function animate() {
                requestAnimationFrame(animate);
                avatar.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            animate();
        });
    </script>
</body>
</html>
